<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>添加微信好友</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.page{text-align:center;width:100%;max-width:400px}
.avatar{width:80px;height:80px;border-radius:50%;background:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.title{color:#fff;font-size:28px;font-weight:700;margin-bottom:8px}
.subtitle{color:rgba(255,255,255,0.75);font-size:14px;margin-bottom:32px}
.card{background:#fff;border-radius:20px;padding:32px 24px;box-shadow:0 8px 40px rgba(0,0,0,0.15);margin-bottom:24px}
.wechat-label{color:#999;font-size:13px;margin-bottom:8px}
.wechat-row{display:flex;align-items:center;background:#f5f5f5;border-radius:12px;padding:16px 20px;gap:12px}
.wechat-icon{width:44px;height:44px;background:#07C160;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wechat-id{flex:1;font-size:22px;font-weight:600;color:#333;text-align:left;word-break:break-all}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:600;cursor:pointer;margin-bottom:12px}
.btn-copy{background:#07C160;color:#fff}
.btn-copy:active{background:#06ad56}
.btn-wechat{background:#1a73e8;color:#fff;display:none}
.btn-wechat:active{background:#1557b0}
.steps{text-align:left;background:rgba(255,255,255,0.1);border-radius:14px;padding:20px}
.steps-title{color:#fff;font-size:14px;font-weight:600;margin-bottom:12px}
.step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.step-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-text{color:rgba(255,255,255,0.8);font-size:14px;line-height:22px}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:15px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="page">
  <div class="avatar">🤝</div>
  <div class="title">加我微信</div>
  <div class="subtitle" id="subtitle">扫码或复制微信号添加好友</div>
  
  <div class="card">
    <div class="wechat-label">微信号</div>
    <div class="wechat-row">
      <div class="wechat-icon">
        <svg viewBox="0 0 24 24" fill="white" width="24" height="24"><path d="M8.5 11a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm7 0a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm-11 2c0 3.3 2.7 6 6 6 .6 0 1.2-.1 1.7-.3l1.8.7-.5-1.6c1-1.1 1.5-2.5 1.5-3.9v-.1c-2 2.3-5.5 3.4-8.5 2.5-2.5-.8-4.5-2.7-5.3-5.2-.5-1.5-.5-3 0-4.5C1.2 9 4.5 13 4.5 13z"/></svg>
      </div>
      <div class="wechat-id" id="wechatId">---</div>
    </div>
  </div>

  <button class="btn btn-copy" id="btnCopy" onclick="doCopy()">📋 复制微信号</button>
  <button class="btn btn-wechat" id="btnWechat" onclick="openWechat()">💬 打开微信添加</button>

  <div class="steps" id="steps" style="display:none">
    <div class="steps-title">📱 抖音用户操作步骤</div>
    <div class="step"><div class="step-num">1</div><div class="step-text">点击上方"复制微信号"</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text">打开微信 App</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text">搜索该微信号并添加好友</div></div>
  </div>
</div>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
var wechatId = '';
var params = new URLSearchParams(window.location.search);
wechatId = params.get('wx') || params.get('id') || params.get('wechat') || '';

// 也支持 URL path 方式: /jump/wechatid
if (!wechatId) {
  var path = window.location.pathname;
  var parts = path.replace(/^\/|\/$/g,'').split('/');
  if (parts.length > 0 && parts[parts.length-1]) {
    wechatId = parts[parts.length-1];
  }
}

if (wechatId) {
  document.getElementById('wechatId').textContent = wechatId;
} else {
  document.getElementById('wechatId').textContent = '请通过正确链接访问';
}

var ua = navigator.userAgent || '';
if (/MicroMessenger/i.test(ua)) {
  document.getElementById('btnWechat').style.display = 'block';
}
if (/aweme/i.test(ua)) {
  document.getElementById('steps').style.display = 'block';
}

function doCopy() {
  var text = wechatId || '';
  if (!text) { showToast('微信号为空'); return; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){ showToast('已复制微信号，请打开微信添加好友'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制微信号，请打开微信添加好友');
  }
}

function openWechat() {
  window.location.href = 'weixin://';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}
</script>
</body>
</html>
